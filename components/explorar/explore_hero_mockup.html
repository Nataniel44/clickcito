
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFAF8;--surface:#FFFFFF;--border:#E8E6E0;--border-strong:#D4D1CA;
  --text:#1A1917;--muted:#6B6860;--hint:#A8A59F;
  --accent:#CC4B1A;--accent-hover:#B8421600;--accent-soft:#FDF1EC;
  --accent-border:#F0C4B0;
}
.hero{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:560px;padding:48px 32px 52px;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 800px 400px at 50% -80px, rgba(204,75,26,0.06) 0%, transparent 70%);pointer-events:none}

.tag{display:inline-flex;align-items:center;gap:8px;padding:5px 14px;background:var(--surface);border:1px solid var(--border);border-radius:100px;font-size:11.5px;font-weight:500;color:var(--muted);letter-spacing:0.02em;margin-bottom:28px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}

.headline{font-family:'DM Serif Display',serif;font-size:48px;line-height:1.05;text-align:center;color:var(--text);margin-bottom:10px;letter-spacing:-0.02em}
.headline em{font-style:italic;color:var(--accent)}
.sub{font-size:15px;color:var(--muted);text-align:center;margin-bottom:36px;line-height:1.6;font-weight:400;max-width:380px}

.search-row{display:flex;gap:8px;width:100%;max-width:580px;margin-bottom:28px}
.search-wrap{flex:1;position:relative}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--hint);width:16px;height:16px}
.search-input{width:100%;padding:13px 16px 13px 42px;background:var(--surface);border:1px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:400;color:var(--text);outline:none;transition:border-color 0.15s}
.search-input::placeholder{color:var(--hint)}
.search-input:focus{border-color:var(--border-strong)}
.loc-btn{display:flex;align-items:center;gap:7px;padding:13px 22px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;letter-spacing:-0.01em}
.pin-icon{width:14px;height:14px;flex-shrink:0}

.chips{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:44px;max-width:560px}
.chip{padding:8px 16px;border-radius:100px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);display:flex;align-items:center;gap:6px;transition:all 0.15s;letter-spacing:-0.01em}
.chip:hover{border-color:var(--border-strong);color:var(--text)}
.chip.active{background:var(--text);color:#fff;border-color:var(--text)}
.chip-icon{font-size:14px;line-height:1}

.divider{width:100%;max-width:580px;height:1px;background:var(--border);margin-bottom:32px}

.stats{display:flex;align-items:center;gap:0}
.stat{display:flex;flex-direction:column;align-items:center;padding:0 28px;position:relative}
.stat+.stat::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:1px;height:28px;background:var(--border)}
.stat-num{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);line-height:1;margin-bottom:4px;letter-spacing:-0.02em}
.stat-label{font-size:11.5px;font-weight:500;color:var(--hint);letter-spacing:0.03em;text-transform:uppercase}

.trust{display:flex;align-items:center;gap:6px;margin-top:24px}
.trust-dot{width:5px;height:5px;border-radius:50%;background:var(--border-strong)}
.trust-text{font-size:12px;color:var(--hint);font-weight:400}
</style>

<div class="hero">
  <div class="tag">
    <span class="dot"></span>
    Misiones, Argentina
  </div>

  <h1 class="headline">Descubrí lo mejor<br>de tu <em>ciudad local.</em></h1>
  <p class="sub">Conectamos vecinos con negocios reales, sin intermediarios ni comisiones.</p>

  <div class="search-row">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/>
      </svg>
      <input class="search-input" type="text" placeholder="Comida, ropa, talleres, servicios…" />
    </div>
    <button class="loc-btn">
      <svg class="pin-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 1a4 4 0 0 1 4 4c0 3-4 8-4 8S3 8 3 5a4 4 0 0 1 4-4z"/><circle cx="7" cy="5" r="1.3"/>
      </svg>
      Cerca mío
    </button>
  </div>

  <div class="chips">
    <div class="chip active">Todo</div>
    <div class="chip"><span class="chip-icon">🍽</span>Gastronomía</div>
    <div class="chip"><span class="chip-icon">👕</span>Indumentaria</div>
    <div class="chip"><span class="chip-icon">✂️</span>Servicios</div>
    <div class="chip"><span class="chip-icon">🔨</span>Construcción</div>
  </div>

  <div class="divider"></div>

  <div class="stats">
    <div class="stat">
      <span class="stat-num">120+</span>
      <span class="stat-label">Negocios activos</span>
    </div>
    <div class="stat">
      <span class="stat-num">Gratis</span>
      <span class="stat-label">Sin comisiones</span>
    </div>
    <div class="stat">
      <span class="stat-num">WhatsApp</span>
      <span class="stat-label">Contacto directo</span>
    </div>
  </div>

  <div class="trust">
    <div class="trust-dot"></div>
    <span class="trust-text">Hecho para comercios de Misiones</span>
    <div class="trust-dot"></div>
  </div>
</div>
